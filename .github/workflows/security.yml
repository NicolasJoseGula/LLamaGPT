name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Cada lunes automáticamente

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks - detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2

  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Safety - scan Python dependencies
        run: |
          pip install safety
          safety check -r server/requirements.txt

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t llamagpt-backend ./server
      - name: Trivy - scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: llamagpt-backend
          severity: CRITICAL,HIGH
          exit-code: '1'
          # El pipeline falla solo si hay vulns que tienen fix disponible pero no aplicadas.
          ignore-unfixed: true