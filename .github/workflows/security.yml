name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Cada lunes automáticamente

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks - detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
  
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Bandit - Python SAST 
        run: |
          pip install bandit
          bandit -r server/app/ -ll -f txt



  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Safety - scan Python dependencies
        run: |
          pip install safety
          safety check -r server/requirements.txt

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t llamagpt-backend ./server
      - name: Trivy - scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: llamagpt-backend
          severity: CRITICAL,HIGH
          exit-code: '1'
          # El pipeline falla solo si hay vulns que tienen fix disponible pero no aplicadas.
          ignore-unfixed: true
  
  guardrail-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd server
          pip install -r requirements.txt
      - name: Run security tests
        env:
          GROQ_API_KEY: "fake-key-for-testing"
          API_SECRET: "fake-secret-for-testing"
        run: |
          cd server 
          pytest tests/test_security.py -v